name: Auto Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & Upload Assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goarch: arm64
            goos: windows

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build Binary
      run: |
        mkdir -p build
        EXT=""
        if [ "${{ matrix.goos }}" = "windows" ]; then
          EXT=".exe"
        fi
        
        BINARY_NAME="passmgr-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
        
        env GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o build/$BINARY_NAME .
        
        echo "Built $BINARY_NAME successfully."

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: build/passmgr-*
